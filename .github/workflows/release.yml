name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r python-bridge/requirements.txt

      - name: Validate Python bridge
        run: python3 -c "import py_compile; py_compile.compile('python-bridge/bridge.py', doraise=True)"

      - name: Build Mod
        run: |
          cd fabric-mod
          chmod +x gradlew
          ./gradlew build -x test

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: .github/release-notes.md
          files: |
            fabric-mod/build/libs/ai-builder-mod-*.jar
            python-bridge/bridge.py
            python-bridge/requirements.txt
          draft: false
          prerelease: false
