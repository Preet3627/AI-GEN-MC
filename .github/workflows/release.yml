name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build Mod
        run: |
          cd fabric-mod
          chmod +x gradlew
          ./gradlew build -x test

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: .github/release-notes.md
          files: |
            fabric-mod/build/libs/ai-builder-mod-*.jar
          draft: false
          prerelease: false
